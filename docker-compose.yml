services:
  postgres:
    image: postgres:16-alpine
    container_name: fitly-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "-c log_statement=all -c log_duration=on -c log_filename=postgresql.log"
    ports:
      - "${DATABASE_PORT}:5432"
    networks:
      - fitly-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/logs/postgres:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Fitly.API/Dockerfile
    container_name: fitly-api
    ports:
      - "5062:5062"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5062
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitly-network
    volumes:
      - ./backend/logs:/app/logs

networks:
  fitly-network: 
    driver: bridge

volumes:
  postgres_data:                  